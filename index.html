<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preload" href="style.css" as="style" onload="this.rel='stylesheet'">
    <link rel="icon" href="" type="image/png">
    <title>Study Clock</title>
</head>

<body>
    <div id="body">
        <div id="menu">
            <div id="menuItems">
                <div><button id="timer">Timer</button></div>
                <div><button id="clock">Clock</button></div>
                <div><button id="stopwatch">Stopwatch</button></div>
            </div>
        </div>
        <div id="content">
            <div id="clock_overlay">
                <p class="clock_overlay" id="time"></p>
                <p class="clock_overlay" id="date"></p>
            </div>

            <div id="timer_overlay" style="display:none;">
                <p id="clock_timer">00:00:00</p>
                <div id="input_timer">
                    <div><input type="number" id="hourTimer" class="timer"></div>
                    <div>h</div>
                    <div><input type="number" id="minuteTimer" class="timer"></div>
                    <div>m</div>
                    <div><input type="number" id="secondTimer" class="timer"></div>
                    <div>s</div>
                </div>

                <div id="menuTimer">
                    <button id="resetTimer" onclick="reset('timer')">Reset</button>
                    <button id="startPauseTimer" onclick="startPause('timer')">Start</button>
                    <button id="saveTimer" onclick="save('timer')">Save</button>
                </div>


            </div>

            <div id="stopwatch_overlay" style="display:none;">

                <p id="clockStopwatch">00:00:00</p>

                <div id="menuStopwatch">
                    <button id="StopStopwatch" onclick="reset('stopwatch')">Reset</button>
                    <button id="startPauseStopwatch" onclick="startPause('stopwatch')">Start</button>
                    <button id="safeStopwatch" onclick="save('stopwatch')">Save</button>
                </div>

            </div>

        </div>

        <div>
            <div>
                <ul id="sessions">
                    <li>Placeholder</li>
                </ul>
            </div>
            <button id="restart" onclick="restart()">Restart</button>
        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
